<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gil Fernandes Imóveis | Em manutenção</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 40px 30px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #60a5fa;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .whatsapp {
      display: inline-block;
      padding: 14px 22px;
      background: #22c55e;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .whatsapp:hover {
      background: #16a34a;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">Gil Fernandes Imóveis</div>

    <h1>Estamos melhorando nosso site 🚧</h1>

    <p>
      Estamos realizando ajustes para oferecer uma experiência ainda melhor para você.
      Em breve nosso site estará totalmente atualizado.
    </p>

    <a 
      class="whatsapp" 
      href="https://wa.me/5511971157373" 
      target="_blank"
    >
      Falar pelo WhatsApp
    </a>

    <div class="footer">
      © 2026 Gil Fernandes Imóveis
    </div>
  </div>
</body>
</html>
